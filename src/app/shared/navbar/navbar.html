<mat-toolbar color="primary" class="navbar">
  <div class="brand-wrap">
    <svg
      class="uchk-logo"
      viewBox="0 0 220 220"
      xmlns="http://www.w3.org/2000/svg"
      aria-label="Logo UCHK"
    >
      <defs>
        <linearGradient id="bgGradNav" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0B2E6E" />
          <stop offset="100%" stop-color="#1F5FBF" />
        </linearGradient>
        <linearGradient id="goldGradNav" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#F3C969" />
          <stop offset="100%" stop-color="#D9A441" />
        </linearGradient>
      </defs>
      <circle cx="110" cy="110" r="102" fill="url(#bgGradNav)" />
      <circle cx="110" cy="110" r="102" fill="none" stroke="url(#goldGradNav)" stroke-width="8" />
      <path d="M42 92 L110 62 L178 92 L110 122 Z" fill="url(#goldGradNav)" />
      <rect x="72" y="108" width="76" height="12" rx="6" fill="#F7E1A8" opacity="0.95" />
      <path
        d="M78 134 L78 154 Q110 174 142 154 L142 134"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="8"
        stroke-linecap="round"
      />
      <rect x="99" y="82" width="22" height="54" rx="6" fill="#FFFFFF" opacity="0.95" />
      <text
        x="110"
        y="195"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="24"
        font-weight="700"
        letter-spacing="1.5"
      >
        UCHK
      </text>
    </svg>
    <div class="brand-text">
      <span class="logo">Université Cheikh Hamidou KANE</span>
      <small class="subtitle">Plateforme de gestion universitaire</small>
    </div>
  </div>

  <span class="spacer"></span>

  <div class="quick-links">
    <button mat-button routerLink="/dashboard" class="nav-button">
      <mat-icon>dashboard</mat-icon>
      Dashboard
    </button>

    <button mat-button routerLink="/etudiants" class="nav-button">
      <mat-icon>people</mat-icon>
      Étudiants
    </button>

    <button mat-button routerLink="/formations" class="nav-button">
      <mat-icon>menu_book</mat-icon>
      Formations
    </button>

    <button mat-button routerLink="/admin" class="nav-button" *ngIf="isAdmin">
      <mat-icon>admin_panel_settings</mat-icon>
      Administration
    </button>
  </div>

  <div class="user-panel">
    <div class="user-meta">
      <span class="user-name">{{ userName }}</span>
      <small class="user-role">{{ userRole || 'Utilisateur' }}</small>
    </div>

    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Menu utilisateur">
      <mat-icon>account_circle</mat-icon>
    </button>
  </div>

  <mat-menu #menu="matMenu">
    <button mat-menu-item routerLink="/mon-compte">
      <mat-icon>person</mat-icon>
      Mon compte
    </button>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      Déconnexion
    </button>
  </mat-menu>
</mat-toolbar>
